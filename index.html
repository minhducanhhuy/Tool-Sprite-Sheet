<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool-Sprite-Sheet</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <header>
            <div class="logo">
                <span class="icon">✨</span>
                <h1>Sprite Sheet<span>Tool</span></h1>
            </div>
            <div class="status-bar">
                <div class="badge" id="api-status">API: Connected</div>
            </div>
        </header>

        <main>
            <section class="sidebar">
                <div class="glass-card upload-section">
                    <h3>1. Tải ảnh gốc</h3>
                    <div class="drop-zone" id="drop-zone">
                        <input type="file" id="file-input" hidden accept="image/*">
                        <div class="drop-zone-content">
                            <span class="upload-icon">📁</span>
                            <p>Kéo thả ảnh hoặc <span>duyệt file</span></p>
                            <small>PNG (Transparent background)</small>
                        </div>
                    </div>
                    <div class="description-box">
                        <div class="desc-header">
                            <label for="char-desc">Mô tả nhân vật:</label>
                            <button id="auto-desc-btn" class="magic-btn" title="Tự động phân tích ảnh">✨ Phân tích ảnh</button>
                        </div>
                        <textarea id="char-desc" placeholder="Ví dụ: Bé gái tóc ngắn màu xanh, mặc áo mưa vàng, đi ủng đỏ..."></textarea>
                    </div>

                </div>


                <div class="glass-card action-section">
                    <h3>2. Chọn hành động</h3>
                    <div class="action-grid">
                        <button class="action-btn active" data-state="idle">
                            <span class="btn-icon">🧘</span> Idle
                        </button>
                        <button class="action-btn" data-state="walk">
                            <span class="btn-icon">🚶</span> Walk
                        </button>
                        <button class="action-btn" data-state="climb_left">
                            <span class="btn-icon">🧗</span> Climb L
                        </button>
                        <button class="action-btn" data-state="climb_right">
                            <span class="btn-icon">🧗</span> Climb R
                        </button>
                        <button class="action-btn" data-state="fall">
                            <span class="btn-icon">⬇️</span> Fall
                        </button>
                        <button class="action-btn" data-state="sit">
                            <span class="btn-icon">🪑</span> Sit
                        </button>
                    </div>
                </div>

                <div class="glass-card generate-section">
                    <button id="generate-btn" class="primary-btn">
                        <span>🚀</span> Generate Assets
                    </button>
                </div>
            </section>

            <section class="preview-area">
                <div class="preview-container glass-card">
                    <div class="preview-header">
                        <div class="preview-tabs">
                            <button class="tab-btn active" id="tab-live">Live Preview</button>
                            <button class="tab-btn" id="tab-frames">Frame Viewer</button>
                        </div>
                        <div class="preview-actions">
                            <button id="export-btn" class="secondary-btn">Download PNGs</button>
                        </div>
                    </div>
                    
                    <div class="preview-stage" id="preview-stage">
                        <!-- Chế độ xem live -->
                        <div id="live-view" class="view-content active">
                            <div id="shimeji-preview" class="shimeji"></div>
                            <div class="stage-floor"></div>
                        </div>

                        <!-- Chế độ xem từng frame -->
                        <div id="frames-view" class="view-content">
                            <div id="frame-grid" class="frame-grid">
                                <!-- Grid các frame sẽ được render ở đây -->
                            </div>
                        </div>
                    </div>


                    <div class="frame-strip" id="frame-strip">
                        <!-- Các frame sẽ hiển thị ở đây -->
                    </div>
                </div>
            </section>
        <!-- Ant Design Message Container -->
        <div id="antd-message-container" class="antd-message-container"></div>

        <!-- Floating Donation Widget -->
        <div class="donation-widget">
            <button class="fab-btn" id="open-donation">
                <span class="heart-icon">❤️</span>
                <span class="fab-text">Ủng hộ tác giả</span>
            </button>
            <div class="donation-menu glass-card" id="donation-menu">
                <div class="menu-header">
                    <h4>Cảm ơn bạn đã ủng hộ!</h4>
                </div>
                <div class="menu-options">
                    <button class="menu-item" id="open-qr">
                        <span class="icon">🇻🇳</span>
                        <div class="item-text">
                            <span>Chuyển khoản (MBBank)</span>
                            <small>Quét mã VietQR nhanh chóng</small>
                        </div>
                    </button>
                    <button class="menu-item" onclick="navigator.clipboard.writeText('minhducanhhuy@gmail.com'); alert('Đã sao chép Email Payoneer!')">
                        <span class="icon">🌎</span>
                        <div class="item-text">
                            <span>International (Payoneer)</span>
                            <small>Email: minhducanhhuy@gmail.com</small>
                        </div>
                    </button>
                </div>
            </div>
        </div>

        <div id="qr-modal" class="modal">
            <div class="modal-content">
                <span class="close-modal">&times;</span>
                <h3>Chuyển khoản VietQR</h3>
                <!-- Sử dụng link đã được mã hóa an toàn -->
                <img src="https://img.vietqr.io/image/MB-9937683773-compact.png?accountName=NGUYEN%20MINH%20DUC" alt="QR Code" id="qr-image">
                <div class="account-details">
                    <p>Chủ TK: <strong>NGUYEN MINH DUC</strong></p>
                    <p>Số TK: <strong>9937683773</strong> (MBBank)</p>
                    <button class="copy-btn primary-btn" id="copy-bank-stk" style="padding: 8px; font-size: 0.85rem; width: 100%; margin-top: 12px;">Sao chép số tài khoản</button>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
